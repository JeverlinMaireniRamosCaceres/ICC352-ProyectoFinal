<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosFormularios.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand h1 mb-0">
            <i class="bi bi-card-list me-2"></i> Formularios
        </span>
        <a href="/index" class="btn btn-outline-light btn-sm">
            <i class="bi bi-house-door"></i> Inicio
        </a>
    </div>
</nav>

<div class="container py-4">
    <div id="mensaje" class="alert d-none" role="alert"></div>

    <div class="d-flex flex-wrap gap-2 mb-4">
        <button id="btn-ver-pendientes" class="btn btn-primary">
            <i class="bi bi-clock-history me-1"></i> Pendientes
        </button>

        <button id="btn-ver-sincronizados" class="btn btn-outline-primary">
            <i class="bi bi-cloud-check me-1"></i> Sincronizados
        </button>

        <button id="btn-sincronizar" class="btn btn-success ms-auto">
            <i class="bi bi-cloud-arrow-up me-1"></i> Sincronizar seleccionados
        </button>
    </div>

    <div id="cards-formularios" class="row g-3">
        <div class="col-12">
            <div class="alert alert-light text-center shadow-sm">
                Cargando formularios...
            </div>
        </div>
    </div>
</div>

<!-- Modal Editar -->
<div class="modal fade" id="editarFormularioModal" tabindex="-1" aria-labelledby="editarFormularioModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="editarFormularioModalLabel">
                    <i class="bi bi-pencil-square me-2"></i>Editar Formulario
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body">
                <form id="editarFormularioForm">
                    <input type="hidden" id="editar-id">

                    <div class="mb-3">
                        <label for="editar-nombre" class="form-label fw-bold">Nombre</label>
                        <input type="text" class="form-control" id="editar-nombre" required>
                    </div>

                    <div class="mb-3">
                        <label for="editar-apellido" class="form-label fw-bold">Apellido</label>
                        <input type="text" class="form-control" id="editar-apellido">
                    </div>

                    <div class="mb-3">
                        <label for="editar-sector" class="form-label fw-bold">Sector</label>
                        <input type="text" class="form-control" id="editar-sector" required>
                    </div>

                    <div class="mb-3">
                        <label for="editar-nivelEscolar" class="form-label fw-bold">Nivel Escolar</label>
                        <select class="form-select" id="editar-nivelEscolar" required>
                            <option value="">Seleccione nivel...</option>
                            <option value="Básico">Básico</option>
                            <option value="Medio">Medio</option>
                            <option value="Grado Universitario">Grado Universitario</option>
                            <option value="Postgrado">Postgrado</option>
                            <option value="Doctorado">Doctorado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="editar-latitud" class="form-label fw-bold">Latitud</label>
                        <input type="text" class="form-control" id="editar-latitud" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="editar-longitud" class="form-label fw-bold">Longitud</label>
                        <input type="text" class="form-control" id="editar-longitud" readonly>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btn-guardar-cambios">
                    <i class="bi bi-save me-1"></i>Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/formulariosLocales.js"></script>
<script src="/js/formularios.js?v=3"></script>
<script src="/js/RegistrarServiceWorker.js"></script>

</body>
</html>

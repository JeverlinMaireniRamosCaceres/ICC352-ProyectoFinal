<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Encuesta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosFormulario.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Encuestas OP | PUCMM</span>
        <div id="connection-badge" class="badge bg-success badge-pulse">Online</div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4 text-primary">Formulario</h4>

                    <form id="encuestaForm">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control form-control-lg" id="nombre" placeholder="Nombre del encuestado" required>
                        </div>

                        <div class="mb-3">
                            <label for="sector" class="form-label fw-bold">Sector</label>
                            <input type="text" class="form-control form-control-lg" id="sector" placeholder="Sector o comunidad" required>
                        </div>

                        <div class="mb-3">
                            <label for="nivelEscolar" class="form-label fw-bold">Nivel Escolar</label>
                            <select class="form-select form-select-lg" id="nivelEscolar" required>
                                <option value="" selected disabled>Seleccione nivel...</option>
                                <option value="Básico">Básico</option>
                                <option value="Medio">Medio</option>
                                <option value="Grado Universitario">Grado Universitario</option>
                                <option value="Postgrado">Postgrado</option>
                                <option value="Doctorado">Doctorado</option>
                            </select>
                        </div>

                        <div class="alert alert-light border d-flex align-items-center mb-4">
                            <i class="bi bi-geo-alt-fill text-danger fs-4 me-3"></i>
                            <div>
                                <small class="text-muted d-block">Ubicación Georeferencial:</small>
                                <span id="geo-status" class="fw-bold text-dark">Detectando GPS...</span>
                            </div>
                            <input type="hidden" id="latitud">
                            <input type="hidden" id="longitud">
                        </div>

                        <div class="mb-4 text-center">
                            <label class="form-label fw-bold d-block mb-3">Foto de Evidencia</label>

                            <div class="camera-container shadow-sm mb-3">
                                <video id="webcam" autoplay playsinline></video>
                                <canvas id="canvas"></canvas>
                            </div>

                            <button type="button" class="btn btn-outline-primary btn-sm px-4" onclick="tomarFoto()">
                                <i class="bi bi-camera-fill me-2"></i> Capturar Foto
                            </button>

                            <div id="preview-container" class="mt-2" style="display:none;">
                                    <span class="badge bg-success-subtle text-success border border-success">
                                        <i class="bi bi-check2-circle"></i> Foto lista
                                    </span>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg shadow">
                                <i class="bi bi-sd-card-fill me-2"></i> Guardar Registro
                            </button>
                            <a href="/index" class="btn btn-light btn-sm text-muted">Volver al inicio</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript" src="https://unpkg.com/webcam-easy/dist/webcam-easy.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>

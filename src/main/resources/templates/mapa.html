<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Registros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosMapa.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand h1 mb-0">
            <i class="bi bi-map-fill me-2"></i> Geo-Registros
        </span>
        <a href="/index" class="btn btn-outline-light btn-sm">
            <i class="bi bi-house-door"></i> Inicio
        </a>
    </div>
</nav>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-12 col-md-8 col-lg-9">
            <div id="map"></div>
        </div>

        <div class="col-12 col-md-4 col-lg-3 bg-white shadow-sm overflow-auto panel-lateral">
            <div class="p-3">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                    <h5 class="fw-bold mb-0">Registros Recientes</h5>
                    <span id="contador-registros" class="badge bg-primary">0</span>
                </div>

                <div id="mensaje-mapa" class="alert d-none" role="alert"></div>

                <div id="lista-puntos" class="list-group list-group-flush">
                    <div class="text-center mt-4 text-muted small">
                        <i class="bi bi-hourglass-split"></i> Cargando registros...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/mapa-script.js"></script>
<script src="/js/RegistrarServiceWorker.js"></script>

</body>
</html>

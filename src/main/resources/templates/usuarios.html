<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosUsuario.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand h1 mb-0" href="/index">PUCMM | Admin</a>
        <div class="d-flex">
            <a href="/formulario" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-plus-lg"></i> Nueva Encuesta
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h4 class="text-primary mb-0">Gestión de Usuarios</h4>

        <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#formRegistrarUsuario" aria-expanded="false" aria-controls="formRegistrarUsuario">
            <i class="bi bi-person-plus-fill me-2"></i> Registrar Usuario
        </button>
    </div>

    <div class="collapse mb-4" id="formRegistrarUsuario">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title mb-3 text-primary">Registrar Usuario</h5>

                <form id="usuarioForm">
                    <div class="row">
                        <div class="col-12 col-md-4 mb-3">
                            <label class="form-label fw-bold">Nombre de Usuario</label>
                            <input type="text" id="username" class="form-control" placeholder="Ej. j_perez" required>
                        </div>

                        <div class="col-12 col-md-4 mb-3">
                            <label class="form-label fw-bold">Rol de Usuario</label>
                            <select id="rol" class="form-select" required>
                                <option value="ENCUESTADOR">Encuestador</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-4 mb-3">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" id="passUsuario" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-grid d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-plus-fill me-2"></i> Guardar Usuario
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h5 class="card-title mb-3 text-primary">Usuarios del Sistema</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="listaUsuarios">
                    <tr>
                        <td class="fw-bold">admin_pucmm</td>
                        <td><span class="badge bg-primary">ADMIN</span></td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="usuarios-script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosUsuario.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand h1 mb-0" href="/index">PUCMM | Admin</a>
        <div class="d-flex">
            <a href="/formulario" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-plus-lg"></i> Nueva Encuesta
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h4 class="text-primary mb-0">Gestión de Usuarios</h4>

        <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#formRegistrarUsuario" aria-expanded="false" aria-controls="formRegistrarUsuario">
            <i class="bi bi-person-plus-fill me-2"></i> Registrar Usuario
        </button>
    </div>

    <!-- FORMULARIO CREAR -->
    <div class="collapse mb-4" id="formRegistrarUsuario">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title mb-3 text-primary">Registrar Usuario</h5>

                <form method="post" action="/usuarios/crear">
                    <div class="row">

                        <div class="col-12 col-md-3 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej. Juan Pérez" required>
                        </div>

                        <div class="col-12 col-md-3 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Ej. juan@pucmm.edu" required>
                        </div>

                        <div class="col-12 col-md-3 mb-3">
                            <label class="form-label fw-bold">Rol</label>
                            <select name="rol" class="form-select" required>
                                <option value="ENCUESTADOR">Encuestador</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-3 mb-3">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="contrasena" class="form-control" placeholder="••••••••" required>
                        </div>

                        <div class="d-grid d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-person-plus-fill me-2"></i> Guardar Usuario
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h5 class="card-title mb-3 text-primary">Usuarios del Sistema</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td>
                            <div class="fw-bold" th:text="${usuario.nombre}">Nombre</div>
                            <div class="text-muted small" th:text="${usuario.email}">correo@correo.com</div>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${usuario.rol == 'ADMIN'} ? ' bg-primary' : ' bg-secondary'"
                                  th:text="${usuario.rol}">
                                ROL
                            </span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-warning me-1"
                               th:href="@{'/usuarios/editar/' + ${usuario.id}}">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <form th:action="@{'/usuarios/eliminar/' + ${usuario.id}}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('¿Está seguro de eliminar este usuario?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${usuarios == null or #lists.isEmpty(usuarios)}">
                        <td colspan="3" class="text-center text-muted">
                            No hay usuarios registrados.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- BLOQUE EDITAR -->
<div th:if="${usuarioEditar != null}" class="modal fade show d-block" id="editarUsuarioModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="bi bi-pencil-square me-2"></i> Editar Usuario
                </h5>
                <a href="/usuarios" class="btn-close btn-close-white"></a>
            </div>

            <form method="post" th:action="@{'/usuarios/editar/' + ${usuarioEditar.id}}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" name="nombre" class="form-control" th:value="${usuarioEditar.nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" th:value="${usuarioEditar.email}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rol</label>
                        <select name="rol" class="form-select" required>
                            <option value="ENCUESTADOR" th:selected="${usuarioEditar.rol == 'ENCUESTADOR'}">Encuestador</option>
                            <option value="ADMIN" th:selected="${usuarioEditar.rol == 'ADMIN'}">Administrador</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="contrasena" class="form-control" placeholder="Déjela vacía si no desea cambiarla">
                    </div>
                </div>

                <div class="modal-footer">
                    <a href="/usuarios" class="btn btn-secondary">Cancelar</a>
                    <button class="btn btn-primary">
                        <i class="bi bi-save me-1"></i> Actualizar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:if="${usuarioEditar != null}" class="modal-backdrop fade show"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

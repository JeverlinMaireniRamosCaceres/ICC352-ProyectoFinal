<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosLogin.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">

            <div class="text-center mb-4">
                <div class="display-1 text-primary">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h3 class="fw-bold">LOGIN</h3>
                <p class="text-muted small">Oficina de Planeamiento (OP) | PUCMM</p>
            </div>

            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                                <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                Ingresar <i class="bi bi-box-arrow-in-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">
                &copy; 2026 PUCMM
            </p>

        </div>
    </div>
</div>

<script src="/js/loginScript.js"></script>
</body>
</html>
